name: ci

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt_version: "5"
          - os: ubuntu-latest
            qt_version: "6"
          - os: windows-latest
            qt_version: "6"
          - os: macos-latest
            qt_version: "6"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version == '5' && '5.15.2' || '6.7.2' }}
          host: ${{ startsWith(matrix.os, 'windows') && 'windows' || startsWith(matrix.os, 'macos') && 'mac' || 'linux' }}
          target: desktop

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure
        run: cmake -S . -B build/ci -G Ninja -DCMAKE_BUILD_TYPE=Debug -DPYRAQT_BUILD_TESTS=ON -DPYRAQT_QT_MAJOR_VERSION=${{ matrix.qt_version }}

      - name: Build
        run: cmake --build build/ci

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure

      - name: Package
        if: matrix.os == 'ubuntu-latest' && matrix.qt_version == '5'
        run: cmake --build build/ci --target package

      - name: Upload packages
        if: matrix.os == 'ubuntu-latest' && matrix.qt_version == '5'
        uses: actions/upload-artifact@v4
        with:
          name: pyraqt-linux-qt5-packages
          path: |
            build/ci/*.deb
            build/ci/*.tar.gz
            build/ci/*.zip

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          files=$(find src tests -type f \( -name "*.cpp" -o -name "*.h" \))
          if [ -n "$files" ]; then
            clang-format --dry-run --Werror $files
          fi
